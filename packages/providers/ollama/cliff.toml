[changelog]
header = """
# Changelog

All notable changes to Namzu are documented here.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/cogitave/namzu
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="ollama-v") | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
  - **{{ commit.scope }}**: {{ commit.message }}
    {%- if commit.breaking %} [**BREAKING**]{% endif -%}
{%- endfor -%}
{% for commit in commits %}
  {%- if not commit.scope %}
  - {{ commit.message }}
    {%- if commit.breaking %} [**BREAKING**]{% endif -%}
  {% endif -%}
{%- endfor -%}
{% endfor %}\n
"""
trim = true
footer = ""
postprocessors = [
  { pattern = '\$REPO', replace = "https://github.com/cogitave/namzu" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore|^ci|^style|^build", group = "Miscellaneous" },
  { body = ".*security", group = "Security" },
  { message = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "newest"
