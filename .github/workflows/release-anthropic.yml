name: Release @namzu/anthropic

on:
  push:
    tags:
      - 'anthropic-v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build, Test & Publish @namzu/anthropic
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/providers/anthropic
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm -r lint
        working-directory: .

      - name: Type check
        run: pnpm typecheck
        working-directory: .

      - name: Build
        run: pnpm -r build
        working-directory: .

      - name: Test
        run: pnpm -r test
        working-directory: .

      - name: Detect release channel and sync version
        id: channel
        run: |
          VERSION="${GITHUB_REF_NAME#anthropic-v}"
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-alpha."* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Verify consumer install (peer range sanity check)
        run: |
          set -euo pipefail
          mkdir -p /tmp/namzu-pack
          pnpm --filter @namzu/anthropic pack --pack-destination /tmp/namzu-pack
          TARBALL=$(ls /tmp/namzu-pack/namzu-anthropic-*.tgz | head -1)
          test -f "$TARBALL"
          mkdir -p /tmp/consumer-install
          cd /tmp/consumer-install
          npm init -y >/dev/null
          npm install --no-fund --no-audit @namzu/sdk@latest "$TARBALL"
          test -d node_modules/@namzu/anthropic
          test -d node_modules/@namzu/sdk
          echo "✓ Consumer install verified: @namzu/anthropic@${{ steps.channel.outputs.version }} resolves with @namzu/sdk@latest"
        working-directory: .

      - name: Publish to npm
        run: pnpm --filter @namzu/anthropic publish --no-git-checks --access public --provenance --tag ${{ steps.channel.outputs.tag }}
        working-directory: .

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/providers/anthropic/package.json packages/providers/anthropic/CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs(changelog): update for $GITHUB_REF_NAME"
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main && git push origin HEAD:main && break
              echo "Push attempt $i failed; retrying..."
              sleep 5
            done
          fi
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        run: |
          FLAGS=""
          if [[ "${{ steps.channel.outputs.prerelease }}" == "true" ]]; then
            FLAGS="--prerelease"
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release of @namzu/anthropic v${{ steps.channel.outputs.version }}" \
            $FLAGS
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
