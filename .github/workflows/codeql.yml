name: CodeQL

# Advanced setup replaces GitHub's default-setup CodeQL config — which
# triggered on BOTH push:main and pull_request, producing two redundant
# scans per PR merge cycle. This advanced setup scans on:
#   - push to main (post-merge baseline — what ends up in the security tab)
#   - weekly schedule (drift detection in main)
#   - manual dispatch
# Pre-merge PR scan is intentionally dropped; ci.yml's lint + typecheck +
# test + publint + attw catches the lints CodeQL would also catch, and
# any post-merge issue will surface on the next scheduled scan.
#
# IMPORTANT: for this YAML to actually take effect, GitHub's default
# CodeQL setup must be disabled via:
#   Settings → Code security and analysis → Code scanning → Configure
#   CodeQL → "Switch to advanced"
# Otherwise default + advanced both run and the duplication is worse.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
