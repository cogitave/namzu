name: CI

# PR-only gate. The post-merge validation on `main` lives in release.yml so
# we don't run the same matrix twice per merge cycle. Direct-to-main pushes
# are validated by release.yml's own inline validation before publish.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      # SDK coverage gate (ses_006-test-coverage-sprint).
      # Runs on one node version only — coverage output is identical across
      # matrix entries, so gating on all four would waste CI time and
      # produce confusing duplicate failures. The gate has two layers:
      #   1. Per-module coverage floors defending named invariants.
      #   2. Structural test-presence rule ensuring every src/ folder is
      #      classified (required | baselineExempt | exempt).
      # Both are non-bypassable by design (no SKIP_* env var).
      - name: SDK coverage (produce summary)
        if: matrix.node-version == 24
        run: pnpm --filter @namzu/sdk test:coverage

      - name: SDK coverage floor gate
        if: matrix.node-version == 24
        run: node .github/scripts/check-sdk-module-coverage.mjs

      - name: SDK test-presence gate
        if: matrix.node-version == 24
        run: node .github/scripts/check-sdk-test-presence.mjs

      # Pre-publish package validation — runs on every PR + every push to main.
      # Catches cross-package peer-range drift and package.json export shape
      # bugs before they reach a publish tag. Only runs on one node version
      # in the matrix to avoid quadrupling install work.
      - name: Pre-publish consumer install check
        if: matrix.node-version == 24
        run: bash .github/scripts/verify-consumer-install.sh

      # Public-surface regression guard (ses_011-sdk-public-surface).
      # Compares `Object.keys(@namzu/sdk)` against a committed baseline.
      # Catches silent drops that .d.ts diffs miss (runtime-only symbols,
      # error classes, zod schemas). Intentional widenings update the
      # baseline in the same commit.
      - name: Public-surface regression check
        if: matrix.node-version == 24
        run: node .github/scripts/verify-public-surface.mjs

      - name: publint (package.json shape)
        if: matrix.node-version == 24
        run: |
          for pkg in sdk telemetry computer-use providers/anthropic providers/bedrock providers/http providers/lmstudio providers/ollama providers/openai providers/openrouter; do
            echo "::group::publint packages/$pkg"
            npx -y publint@latest packages/$pkg
            echo "::endgroup::"
          done

      - name: Are the types wrong? (type resolution)
        if: matrix.node-version == 24
        run: |
          # attw needs the packed tarballs; reuse the ones from verify-consumer-install
          # by packing once into a stable location here.
          rm -rf /tmp/attw-pack && mkdir -p /tmp/attw-pack
          for pkg in sdk telemetry computer-use anthropic bedrock http lmstudio ollama openai openrouter; do
            pnpm --filter "@namzu/$pkg" pack --pack-destination /tmp/attw-pack >/dev/null
          done
          for tarball in /tmp/attw-pack/*.tgz; do
            echo "::group::attw $(basename $tarball)"
            npx -y @arethetypeswrong/cli@latest --pack "$tarball" --ignore-rules cjs-resolves-to-esm
            echo "::endgroup::"
          done
