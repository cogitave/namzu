name: Release

# Only run after CI has succeeded on main. workflow_run decouples the
# release job from the validation job while keeping them in lockstep:
# if CI is red, release never starts. No duplicate lint/test/build.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release (Changesets)
    runs-on: ubuntu-latest
    # Gate: only run if the triggering CI run succeeded. Otherwise skip.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_run events fire with the workflow file from the
          # default branch, but checkout needs to point at the commit
          # CI actually validated.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Pre-publish consumer install check. Runs only when this commit is
      # the merged "Version Packages" PR (the one Changesets opens to bump
      # versions + CHANGELOG). For every other main-push the Changesets
      # action only refreshes the Version Packages PR and this gate is
      # skipped — no need to pack 9 tarballs on unrelated commits.
      - name: Pre-publish consumer install check
        if: "${{ startsWith(github.event.workflow_run.head_commit.message, 'chore(release): version packages') }}"
        run: bash .github/scripts/verify-consumer-install.sh

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
