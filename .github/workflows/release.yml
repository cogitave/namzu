name: Release

# Runs on every push to main — both direct pushes and merge commits from
# PRs. This workflow is self-contained: it runs the full validation
# matrix before touching the Changesets action, so it can stand alone
# without the pre-merge ci.yml run.
#
# Per PR merge cycle:
#   - PR opened:   ci.yml runs (pre-merge gate)
#   - PR merged:   release.yml runs (post-merge validation + publish)
# Total: 2 matrix runs per cycle, not 3 (was: CI-on-PR + CI-on-main + Release).
on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release (Changesets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: publint (package.json shape)
        run: |
          for pkg in sdk telemetry computer-use providers/anthropic providers/bedrock providers/http providers/lmstudio providers/ollama providers/openai providers/openrouter; do
            echo "::group::publint packages/$pkg"
            npx -y publint@latest packages/$pkg
            echo "::endgroup::"
          done

      - name: Are the types wrong? (type resolution)
        run: |
          rm -rf /tmp/attw-pack && mkdir -p /tmp/attw-pack
          for pkg in sdk telemetry computer-use anthropic bedrock http lmstudio ollama openai openrouter; do
            pnpm --filter "@namzu/$pkg" pack --pack-destination /tmp/attw-pack >/dev/null
          done
          for tarball in /tmp/attw-pack/*.tgz; do
            echo "::group::attw $(basename $tarball)"
            npx -y @arethetypeswrong/cli@latest --pack "$tarball" --ignore-rules cjs-resolves-to-esm
            echo "::endgroup::"
          done

      # Pre-publish consumer install check. Runs only when this commit is
      # the merged "Version Packages" PR (the one Changesets opens to bump
      # versions + CHANGELOG). For every other main-push the Changesets
      # action only refreshes the Version Packages PR and this gate is
      # skipped — no need to pack 9 tarballs on unrelated commits.
      - name: Pre-publish consumer install check
        if: "${{ startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
        run: bash .github/scripts/verify-consumer-install.sh

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
